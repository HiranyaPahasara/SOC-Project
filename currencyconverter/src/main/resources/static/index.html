<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }
    h1 {
      color: #333;
      margin-bottom: 8px;
      font-size: 28px;
    }
    .subtitle {
      color: #888;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      color: #555;
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.1s;
    }
    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    .result {
      margin-top: 24px;
      padding: 20px;
      background: #f7f7ff;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      display: none;
    }
    .result.show { display: block; }
    .result-amount {
      font-size: 28px;
      font-weight: 700;
      color: #333;
    }
    .result-label {
      color: #888;
      font-size: 13px;
      margin-top: 4px;
    }
    .links {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 13px;
      color: #888;
      text-align: center;
    }
    .links a {
      color: #667eea;
      text-decoration: none;
      margin: 0 8px;
    }
    .links a:hover { text-decoration: underline; }
    .error {
      color: #d32f2f;
      background: #ffebee;
      border-left-color: #d32f2f;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Currency Converter</h1>
    <p class="subtitle">USD to LKR conversion service</p>

    <form id="converter">
      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" step="0.01" min="0" value="1" required />
      </div>
      <div class="form-group">
        <label for="from">From Currency</label>
        <select id="from" required>
          <option value="USD">USD</option>
        </select>
      </div>
      <button type="submit">Convert</button>
    </form>

    <div id="result" class="result">
      <div class="result-amount" id="resultAmount">—</div>
      <div class="result-label" id="resultLabel"></div>
    </div>

    <div class="links">
      <a href="/api/currency/history" target="_blank">View History</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('converter');
    const result = document.getElementById('result');
    const resultAmount = document.getElementById('resultAmount');
    const resultLabel = document.getElementById('resultLabel');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const amount = document.getElementById('amount').value;
      const from = document.getElementById('from').value;

      try {
        const res = await fetch(`/api/currency/convert?amount=${amount}&from=${from}`, {
          method: 'POST'
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        result.classList.remove('error');
        result.classList.add('show');
        resultAmount.textContent = `${data.outputAmount} ${data.toCurrency}`;
        resultLabel.textContent = `${data.inputAmount} ${data.fromCurrency} converted at ${new Date(data.timestamp).toLocaleString()}`;
      } catch (err) {
        result.classList.add('show', 'error');
        resultAmount.textContent = 'Error';
        resultLabel.textContent = err.message;
      }
    });
  </script>
</body>
</html>
