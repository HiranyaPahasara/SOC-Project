services:
  currencyconverter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: currencyconverter
    ports:
      - "8081:8081"
    environment:
      SPRING_MONGODB_URI: mongodb://mongo:27017/currency_db
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - currencyconverter-net

  mongo:
    image: mongo:7
    container_name: currencyconverter-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - currencyconverter-net

volumes:
  mongo_data:

networks:
  currencyconverter-net:
    driver: bridge
