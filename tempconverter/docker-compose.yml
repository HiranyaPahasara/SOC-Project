services:
  tempconverter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tempconverter
    ports:
      - "8181:8181"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/tempconverter
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tempconverter-net

  mongo:
    image: mongo:7
    container_name: tempconverter-mongo
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - tempconverter-net

volumes:
  mongo_data:

networks:
  tempconverter-net:
    driver: bridge
